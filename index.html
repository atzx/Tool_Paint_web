<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint Pro - Editor de Imágenes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Barra de menú superior -->
        <div id="menu-bar">
            <div class="menu-group">
                <button class="menu-btn" id="menu-file">Archivo</button>
                <div class="menu-dropdown" id="dropdown-file">
                    <button id="btn-new">Nuevo</button>
                    <button id="btn-open">Abrir...</button>
                    <button id="btn-save">Guardar como PNG</button>
                    <button id="btn-save-jpg">Guardar como JPG</button>
                    <hr>
                    <button id="btn-export-layer">Exportar capa actual</button>
                </div>
            </div>
            <div class="menu-group">
                <button class="menu-btn" id="menu-edit">Edición</button>
                <div class="menu-dropdown" id="dropdown-edit">
                    <button id="btn-undo">Deshacer (Ctrl+Z)</button>
                    <button id="btn-redo">Rehacer (Ctrl+Y)</button>
                    <hr>
                    <button id="btn-cut">Cortar (Ctrl+X)</button>
                    <button id="btn-copy">Copiar (Ctrl+C)</button>
                    <button id="btn-paste">Pegar (Ctrl+V)</button>
                    <hr>
                    <button id="btn-select-all">Seleccionar todo</button>
                    <button id="btn-deselect">Deseleccionar</button>
                </div>
            </div>
            <div class="menu-group">
                <button class="menu-btn" id="menu-view">Ver</button>
                <div class="menu-dropdown" id="dropdown-view">
                    <button id="btn-zoom-in">Acercar (+)</button>
                    <button id="btn-zoom-out">Alejar (-)</button>
                    <button id="btn-zoom-reset">Restablecer zoom</button>
                    <hr>
                    <button id="btn-toggle-grid">Mostrar/Ocultar cuadrícula</button>
                </div>
            </div>
        </div>

        <!-- Barra de herramientas lateral -->
        <div id="toolbar">
            <div class="tool-section">
                <h4>Herramientas</h4>
                <button class="tool-btn active" data-tool="brush" title="Pincel (B)">
                    <svg viewBox="0 0 24 24"><path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34a.996.996 0 0 0-1.41 0L9 12.25 11.75 15l8.96-8.96a.996.996 0 0 0 0-1.41z"/></svg>
                </button>
                <button class="tool-btn" data-tool="pencil" title="Lápiz (P)">
                    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                </button>
                <button class="tool-btn" data-tool="eraser" title="Borrador (E)">
                    <svg viewBox="0 0 24 24"><polygon points="4,17 8,21 21,8 17,4" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><line x1="8" y1="21" x2="13" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <button class="tool-btn" data-tool="bucket" title="Rellenar (F)">
                    <svg viewBox="0 0 24 24"><path d="M4 8h16l-2.5 12H6.5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M6 8q6-7 12 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M10 20h4l-2 3" fill="currentColor"/></svg>
                </button>
                <button class="tool-btn" data-tool="picker" title="Cuentagotas (I)">
                    <svg viewBox="0 0 24 24"><path d="M20.71 5.63l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-3.12 3.12-1.93-1.91-1.41 1.41 1.42 1.42L3 16.25V21h4.75l8.92-8.92 1.42 1.42 1.41-1.41-1.92-1.92 3.12-3.12c.4-.4.4-1.03.01-1.42zM5.25 19H5v-.25l7.07-7.07 1.06 1.06L5.25 19z"/></svg>
                </button>
            </div>

            <div class="tool-section">
                <h4>Formas</h4>
                <button class="tool-btn" data-tool="line" title="Línea (L)">
                    <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2"/></svg>
                </button>
                <button class="tool-btn" data-tool="rect" title="Rectángulo (R)">
                    <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </button>
                <button class="tool-btn" data-tool="circle" title="Círculo (C)">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </button>
                <button class="tool-btn" data-tool="polygon" title="Polígono (O)">
                    <svg viewBox="0 0 24 24"><polygon points="12,2 22,8 18,22 6,22 2,8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </button>
            </div>

            <div class="tool-section">
                <h4>Selección</h4>
                <button class="tool-btn" data-tool="select-rect" title="Selección rectangular (M)">
                    <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="3,2"/></svg>
                </button>
                <button class="tool-btn" data-tool="select-lasso" title="Lazo (S)">
                    <svg viewBox="0 0 24 24"><path d="M4 12c0-4.4 3.6-8 8-8s8 3.6 8 8-3.6 8-8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M12 20l-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <button class="tool-btn" data-tool="select-wand" title="Varita mágica (W)">
                    <svg viewBox="0 0 24 24"><line x1="5" y1="20" x2="15" y2="10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><path d="M18 4l-1 5h6l-5 1v4l1-5h-6l5-1z" fill="currentColor"/></svg>
                </button>
                <button class="tool-btn" data-tool="crop" title="Recortar (R)">
                    <svg viewBox="0 0 24 24"><path d="M7 17V1H5v4H1v2h4v10c0 1.1.9 2 2 2h10v4h2v-4h4v-2H7zm10-4V7c0-1.1-.9-2-2-2h-4v2h4v6h2z"/></svg>
                </button>
            </div>

            <div class="tool-section">
                <h4>Texto</h4>
                <button class="tool-btn" data-tool="text" title="Texto (T)">
                    <svg viewBox="0 0 24 24"><path d="M5 4v3h5.5v12h3V7H19V4z"/></svg>
                </button>
            </div>

            <div class="tool-section">
                <h4>Propiedades</h4>
                <div class="property-group">
                    <label>Color principal:</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="color-primary" value="#000000">
                        <div class="color-preview" id="preview-primary" style="background: #000000;"></div>
                    </div>
                </div>
                <div class="property-group">
                    <label>Color secundario:</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="color-secondary" value="#ffffff">
                        <div class="color-preview" id="preview-secondary" style="background: #ffffff;"></div>
                    </div>
                </div>
                <div class="property-group">
                    <label>Grosor: <span id="size-value">5</span>px</label>
                    <input type="range" id="brush-size" min="1" max="100" value="5">
                </div>
                <div class="property-group">
                    <label>Opacidad: <span id="opacity-value">100</span>%</label>
                    <input type="range" id="brush-opacity" min="1" max="100" value="100">
                </div>
                <div class="property-group">
                    <label>
                        <input type="checkbox" id="fill-shape"> Rellenar formas
                    </label>
                </div>
                <div class="property-group">
                    <label>Tolerancia varita:</label>
                    <input type="range" id="wand-tolerance" min="0" max="100" value="32">
                </div>
            </div>
        </div>

        <!-- Área de trabajo principal -->
        <div id="workspace">
            <div id="canvas-container">
                <div id="canvas-wrapper">
                    <canvas id="main-canvas"></canvas>
                    <canvas id="temp-canvas"></canvas>
                    <canvas id="selection-canvas"></canvas>
                    <canvas id="event-canvas"></canvas>
                    <div id="text-input-container" style="display: none;">
                        <textarea id="text-input" placeholder="Escribe aquí..."></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- Panel de capas -->
        <div id="layers-panel">
            <div class="panel-header">
                <h3>Capas</h3>
                <div class="panel-actions">
                    <button id="btn-new-layer" title="Nueva capa">+</button>
                    <button id="btn-delete-layer" title="Eliminar capa">−</button>
                </div>
            </div>
            <div id="layers-list"></div>
            <div class="panel-footer">
                <label>Opacidad de capa:</label>
                <input type="range" id="layer-opacity" min="0" max="100" value="100">
                <button id="btn-merge-down">Fusionar abajo</button>
            </div>
        </div>

        <!-- Barra de estado inferior -->
        <div id="status-bar">
            <span id="status-position">Posición: 0, 0</span>
            <span id="status-size">Tamaño: 800 x 600</span>
            <span id="status-zoom">Zoom: 100%</span>
            <span id="status-tool">Herramienta: Pincel</span>
        </div>

        <!-- Diálogo de nuevo documento -->
        <div id="dialog-new" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>Nuevo documento</h3>
                <div class="form-group">
                    <label>Ancho (px):</label>
                    <input type="number" id="new-width" value="800" min="1" max="5000">
                </div>
                <div class="form-group">
                    <label>Alto (px):</label>
                    <input type="number" id="new-height" value="600" min="1" max="5000">
                </div>
                <div class="form-group">
                    <label>Fondo:</label>
                    <select id="new-bg">
                        <option value="transparent">Transparente</option>
                        <option value="white">Blanco</option>
                        <option value="black">Negro</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button id="btn-create-new">Crear</button>
                    <button id="btn-cancel-new">Cancelar</button>
                </div>
            </div>
        </div>

        <!-- Diálogo de texto / Fonts (flotante y movible) -->
        <div id="dialog-text" style="display: none;">
            <div id="fonts-header">
                <span>Fonts</span>
            </div>
            <div id="fonts-body">
                <div class="fonts-toolbar">
                    <div class="fonts-group">
                        <select id="text-font">
                            <option value="Arial">Arial</option>
                            <option value="Times New Roman">Times New Roman</option>
                            <option value="Courier New">Courier New</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Verdana">Verdana</option>
                            <option value="Impact">Impact</option>
                            <option value="Comic Sans MS">Comic Sans MS</option>
                            <option value="Trebuchet MS">Trebuchet MS</option>
                            <option value="Palatino Linotype">Palatino Linotype</option>
                            <option value="Lucida Console">Lucida Console</option>
                            <option value="Tahoma">Tahoma</option>
                            <option value="Segoe UI">Segoe UI</option>
                        </select>
                    </div>
                    <div class="fonts-group">
                        <input type="number" id="text-size" value="12" min="1" max="999" list="size-presets">
                        <datalist id="size-presets">
                            <option value="8"><option value="9"><option value="10">
                            <option value="11"><option value="12"><option value="14">
                            <option value="16"><option value="18"><option value="20">
                            <option value="24"><option value="28"><option value="32">
                            <option value="36"><option value="48"><option value="72">
                        </datalist>
                    </div>
                    <button class="fonts-btn fonts-btn-toggle" id="text-bold" title="Bold"><b>B</b></button>
                    <button class="fonts-btn fonts-btn-toggle" id="text-italic" title="Italic"><i>I</i></button>
                    <button class="fonts-btn fonts-btn-toggle" id="text-underline" title="Underline"><u>U</u></button>
                    <div class="fonts-vwm-wrapper">
                        <button class="fonts-btn fonts-btn-toggle" id="text-vertical" title="Vertical Writing Mode">
                            <span class="vwm-icon">V</span>
                        </button>
                        <div class="vwm-tooltip">Vertical writing is intended for Far East scripts.</div>
                    </div>
                </div>
                <div class="fonts-actions">
                    <button id="btn-apply-text">Apply</button>
                    <button id="btn-cancel-text">Cancel</button>
                </div>
            </div>
        </div>

        <input type="file" id="file-input" accept="image/*" style="display: none;">
    </div>

    <script src="app.js"></script>
</body>
</html>
